<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZORRITA - Clima, Hora & Busqueda Segura</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #0f3460;
            --highlight: #e94560;
            --text: #eaeaea;
            --muted: #8b8b9a;
            --rain: #4a90d9;
            --safe: #00d4aa;
        }

        html, body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--primary);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            touch-action: manipulation;
        }

        /* ===== SPLASH ===== */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 1.2s ease, transform 1.2s ease;
        }

        .splash-screen.hidden {
            opacity: 0;
            transform: scale(1.1);
            pointer-events: none;
        }

        .splash-image {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--highlight);
            box-shadow: 0 0 60px rgba(233, 69, 96, 0.4), 
                        0 0 120px rgba(233, 69, 96, 0.1);
            animation: pulse-glow 2s ease-in-out infinite;
            cursor: pointer;
            transition: transform 0.3s ease;
            -webkit-user-select: none;
            user-select: none;
        }

        .splash-image:hover, .splash-image:active {
            transform: scale(1.05);
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 60px rgba(233, 69, 96, 0.4), 0 0 120px rgba(233, 69, 96, 0.1); }
            50% { box-shadow: 0 0 80px rgba(233, 69, 96, 0.6), 0 0 160px rgba(233, 69, 96, 0.2); }
        }

        .tap-hint {
            margin-top: 30px;
            font-family: 'Caveat', cursive;
            font-size: 1.6rem;
            color: var(--muted);
            animation: fade-blink 1.5s ease-in-out infinite;
            letter-spacing: 2px;
            pointer-events: none;
        }

        @keyframes fade-blink {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* ===== CREATOR REVEAL ===== */
        .creator-reveal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 15, 0.98);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .creator-reveal.active {
            display: flex;
            opacity: 1;
        }

        .creator-image {
            width: 200px;
            height: 200px;
            border-radius: 20px;
            object-fit: cover;
            border: 2px solid var(--highlight);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            animation: slideUp 0.6s ease;
            -webkit-user-select: none;
            user-select: none;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .creator-name {
            font-family: 'Caveat', cursive;
            font-size: 3rem;
            color: var(--highlight);
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
            animation: slideUp 0.6s ease 0.2s both;
        }

        .creator-title {
            font-size: 1.1rem;
            color: var(--muted);
            margin-top: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: slideUp 0.6s ease 0.4s both;
        }

        .close-creator {
            margin-top: 30px;
            padding: 12px 35px;
            background: transparent;
            border: 2px solid var(--highlight);
            color: var(--highlight);
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s;
            animation: slideUp 0.6s ease 0.6s both;
            -webkit-tap-highlight-color: rgba(233, 69, 96, 0.3);
        }

        .close-creator:hover, .close-creator:active {
            background: var(--highlight);
            color: white;
        }

        /* ===== ZORRITA BADGE ===== */
        .zorrita-badge {
            position: fixed;
            bottom: 15px;
            right: 15px;
            z-index: 1000;
            font-family: 'Caveat', cursive;
            font-size: 1.8rem;
            color: var(--highlight);
            opacity: 0.3;
            transition: opacity 0.3s;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.3);
            transform: rotate(-5deg);
        }

        /* ===== MAIN APP ===== */
        .main-app {
            display: none;
            min-height: 100vh;
            padding: 20px;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .main-app.visible {
            display: block;
            opacity: 1;
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center;
            padding: 40px 20px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--text), var(--highlight));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .header .subtitle {
            color: var(--muted);
            font-size: 1rem;
            letter-spacing: 2px;
        }

        /* ===== RELOJ Y FECHA ===== */
        .datetime-section {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 30px 0;
        }

        .datetime-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 25px 35px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            min-width: 160px;
        }

        .datetime-card:hover {
            border-color: var(--highlight);
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(233, 69, 96, 0.1);
        }

        .datetime-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .datetime-value {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
        }

        .date-value {
            font-size: 1.2rem;
        }

        /* ===== CLIMA ===== */
        .weather-section {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-title {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 30px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 2px;
            background: var(--highlight);
            margin: 10px auto 0;
        }

        .weather-search {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .weather-search input {
            flex: 1;
            min-width: 250px;
            max-width: 400px;
            padding: 15px 25px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .weather-search input:focus {
            border-color: var(--highlight);
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.2);
        }

        .weather-search input::placeholder {
            color: var(--muted);
        }

        .weather-search button {
            padding: 15px 30px;
            background: var(--highlight);
            border: none;
            border-radius: 50px;
            color: white;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            -webkit-tap-highlight-color: rgba(255,255,255,0.2);
        }

        .weather-search button:hover, .weather-search button:active {
            background: #ff6b81;
            transform: scale(1.05);
            box-shadow: 0 5px 25px rgba(233, 69, 96, 0.4);
        }

        .weather-result {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            backdrop-filter: blur(10px);
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .weather-result.show {
            display: block;
            opacity: 1;
        }

        .weather-city {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
            color: var(--text);
        }

        .weather-country {
            color: var(--muted);
            font-size: 1rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .weather-main {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .weather-icon {
            font-size: 4rem;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));
        }

        .weather-temp {
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, var(--rain));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .weather-desc {
            font-size: 1.3rem;
            color: var(--muted);
            text-transform: capitalize;
            margin: 10px 0;
        }

        .rain-status {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        .rain-yes {
            background: rgba(74, 144, 217, 0.2);
            border: 1px solid var(--rain);
            color: var(--rain);
        }

        .rain-no {
            background: rgba(255, 193, 7, 0.2);
            border: 1px solid #ffc107;
            color: #ffc107;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 25px;
        }

        .detail-item {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .detail-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--muted);
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text);
        }

        .error-msg {
            color: var(--highlight);
            text-align: center;
            padding: 20px;
            display: none;
            background: rgba(233, 69, 96, 0.1);
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .error-msg.show {
            display: block;
        }

        /* ===== BUSCADOR SEGURO ===== */
        .search-section {
            max-width: 800px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .search-container {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 25px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }

        .search-info {
            background: rgba(0, 212, 170, 0.1);
            border: 1px solid var(--safe);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            color: var(--safe);
            font-size: 0.95rem;
        }

        .search-info strong {
            color: var(--text);
        }

        .search-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-input-group input {
            flex: 1;
            min-width: 200px;
            padding: 15px 25px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            outline: none;
        }

        .search-input-group input:focus {
            border-color: var(--safe);
            box-shadow: 0 0 20px rgba(0, 212, 170, 0.2);
        }

        .search-input-group input::placeholder {
            color: var(--muted);
        }

        .search-input-group button {
            padding: 15px 30px;
            background: var(--safe);
            border: none;
            border-radius: 50px;
            color: #0a0a0f;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            -webkit-tap-highlight-color: rgba(0, 212, 170, 0.3);
        }

        .search-input-group button:hover, .search-input-group button:active {
            background: #00ffc8;
            transform: scale(1.05);
            box-shadow: 0 5px 25px rgba(0, 212, 170, 0.4);
        }

        .engine-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .engine-btn {
            padding: 8px 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 25px;
            color: var(--muted);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .engine-btn:hover {
            border-color: var(--safe);
            color: var(--safe);
        }

        .engine-btn.active {
            background: var(--safe);
            border-color: var(--safe);
            color: #0a0a0f;
            font-weight: 600;
        }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
            font-size: 0.9rem;
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: 50px;
        }

        .footer strong {
            color: var(--highlight);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header h1 { font-size: 1.8rem; }
            .weather-temp { font-size: 3rem; }
            .splash-image { width: 200px; height: 200px; }
            .creator-name { font-size: 2.2rem; }
            .datetime-card { padding: 20px 25px; min-width: 140px; }
            .zorrita-badge { font-size: 1.4rem; }
            .datetime-value { font-size: 1.8rem; }
        }

        @media (max-width: 480px) {
            .header h1 { font-size: 1.4rem; letter-spacing: 2px; }
            .weather-search input { min-width: 100%; }
            .search-input-group input { min-width: 100%; }
            .splash-image { width: 160px; height: 160px; }
            .tap-hint { font-size: 1.3rem; }
            .weather-icon { font-size: 3rem; }
            .weather-temp { font-size: 2.5rem; }
            .engine-selector { gap: 6px; }
            .engine-btn { padding: 6px 12px; font-size: 0.75rem; }
        }

        /* ===== LOADING ===== */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--highlight);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- ===== SPLASH ===== -->
    <div class="splash-screen" id="splash">
        <img src="foto.png" alt="Portada" class="splash-image" id="splashImg" onerror="this.onerror=null;this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22260%22 height=%22260%22><rect fill=%22%231a1a2e%22 width=%22260%22 height=%22260%22/><text fill=%22%23e94560%22 font-family=%22Arial%22 font-size=%2240%22 x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22>ZORRITA</text></svg>'">
        <p class="tap-hint">Toca la imagen o presiona Enter</p>
    </div>

    <!-- ===== CREATOR REVEAL ===== -->
    <div class="creator-reveal" id="creatorReveal">
        <img src="name.png" alt="Creador" class="creator-image" onerror="this.onerror=null;this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22><rect fill=%22%2316213e%22 width=%22200%22 height=%22200%22 rx=%2220%22/><text fill=%22%23e94560%22 font-family=%22Arial%22 font-size=%2230%22 x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22>ZORRITA</text></svg>'">
        <div class="creator-name">ZORRITA</div>
        <div class="creator-title">Programadora</div>
        <button class="close-creator" id="closeCreatorBtn">Entrar al sitio</button>
    </div>

    <!-- ===== MAIN APP ===== -->
    <div class="main-app" id="mainApp">

        <header class="header">
            <h1>ZORRITA</h1>
            <p class="subtitle">Clima &middot; Hora &middot; Busqueda Segura</p>
        </header>

        <!-- Reloj y Fecha -->
        <section class="datetime-section">
            <div class="datetime-card">
                <div class="datetime-label">Hora
